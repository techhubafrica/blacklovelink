<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover: enables edge-to-edge on notch/dynamic-island iPhones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- iOS PWA: run as standalone app, no browser chrome -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BlackLoveLink" />

  <!-- Android / browser theme colour -->
  <meta name="theme-color" content="#141720" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" href="/blacklovelink-logo.png" />
  <link rel="apple-touch-icon" href="/blacklovelink-logo.png" />

  <title>BlackLoveLink – Where Black Love Begins</title>
  <meta name="description"
    content="BlackLoveLink is the premier platform for verified Black professionals to build authentic, meaningful connections. Find your match today." />
  <meta name="author" content="BlackLoveLink" />

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn sharing) -->
  <meta property="og:title" content="BlackLoveLink – Where Black Love Begins" />
  <meta property="og:description"
    content="The premier dating platform for verified Black professionals. Find authentic connections that celebrate who you are." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://blacklovelink.netlify.app/og-image.png" />
  <meta property="og:site_name" content="BlackLoveLink" />
  <meta property="og:url" content="https://blacklovelink.netlify.app" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@BlackLoveLink" />
  <meta name="twitter:title" content="BlackLoveLink – Where Black Love Begins" />
  <meta name="twitter:description" content="The premier dating platform for verified Black professionals." />
  <meta name="twitter:image" content="https://blacklovelink.netlify.app/og-image.png" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BlackLoveLink",
      "url": "https://blacklovelink.netlify.app",
      "logo": "https://blacklovelink.netlify.app/blacklovelink-logo.png",
      "sameAs": ["https://twitter.com/BlackLoveLink"]
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BlackLoveLink",
      "url": "https://blacklovelink.netlify.app"
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
